<!-- Lightbox overlay -->
<div class="lightbox" id="lightbox" hidden>
  <button class="lightbox-close" type="button" aria-label="Close">&times;</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="" />
  <div class="lightbox-video" id="lightbox-video" hidden></div>
</div>
<script>
(function(){
  var lb    = document.getElementById('lightbox');
  var img   = document.getElementById('lightbox-img');
  var vidWr = document.getElementById('lightbox-video');
  var mode  = 'image'; // 'image' or 'video'
  var scale = 1, ox = 0, oy = 0;
  var dragging = false, didDrag = false, dragSX, dragSY;

  function applyTransform() {
    img.style.transform = 'translate(' + ox + 'px,' + oy + 'px) scale(' + scale + ')';
  }

  function updateCursor() {
    img.style.cursor = scale > 1 ? 'grab' : 'zoom-in';
  }

  function openImage(src, alt) {
    mode = 'image';
    scale = 1; ox = 0; oy = 0;
    img.src = src;
    img.alt = alt || '';
    img.hidden = false;
    vidWr.hidden = true;
    vidWr.innerHTML = '';
    applyTransform();
    updateCursor();
    lb.hidden = false;
    document.body.style.overflow = 'hidden';
  }

  function openVideo(ytId) {
    mode = 'video';
    img.hidden = true;
    img.src = '';
    vidWr.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + encodeURIComponent(ytId) + '?autoplay=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
    vidWr.hidden = false;
    lb.hidden = false;
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.hidden = true;
    img.src = '';
    img.hidden = false;
    vidWr.innerHTML = '';
    vidWr.hidden = true;
    document.body.style.overflow = '';
  }

  // Image triggers (event delegation)
  document.addEventListener('click', function(e) {
    if (!lb.hidden) return;
    var trigger = e.target.closest('.lightbox-trigger');
    if (!trigger) return;
    e.preventDefault();
    var src = trigger.dataset.full || trigger.src || '';
    var inner = trigger.querySelector('img');
    var alt = trigger.dataset.alt || trigger.alt || (inner ? inner.alt : '') || '';
    if (src) openImage(src, alt);
  });

  // Video triggers (custom event from downloads.js)
  document.addEventListener('lightbox:video', function(e) {
    if (e.detail && e.detail.id) openVideo(e.detail.id);
  });

  // Close on backdrop
  lb.addEventListener('mouseup', function(e) {
    if (!didDrag && e.target === lb) close();
  });

  // Close button
  lb.addEventListener('click', function(e) {
    if (e.target.closest('.lightbox-close')) close();
  });

  // Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && !lb.hidden) close();
  });

  // Wheel zoom (image mode only)
  lb.addEventListener('wheel', function(e) {
    if (mode !== 'image') return;
    e.preventDefault();
    var r   = lb.getBoundingClientRect();
    var lcx = r.left + r.width  / 2;
    var lcy = r.top  + r.height / 2;
    var factor   = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    var newScale = Math.min(Math.max(1, scale * factor), 8);
    if (newScale > 1) {
      var px = (e.clientX - lcx - ox) / scale;
      var py = (e.clientY - lcy - oy) / scale;
      ox = e.clientX - lcx - px * newScale;
      oy = e.clientY - lcy - py * newScale;
    } else {
      ox = 0; oy = 0;
    }
    scale = newScale;
    applyTransform();
    updateCursor();
  }, { passive: false });

  // Double-click to reset zoom
  img.addEventListener('dblclick', function(e) {
    e.stopPropagation();
    scale = 1; ox = 0; oy = 0;
    applyTransform();
    updateCursor();
  });

  // Drag to pan when zoomed
  img.addEventListener('mousedown', function(e) {
    if (scale <= 1) return;
    dragging = true;
    didDrag  = false;
    dragSX   = e.clientX - ox;
    dragSY   = e.clientY - oy;
    img.style.cursor = 'grabbing';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var nx = e.clientX - dragSX;
    var ny = e.clientY - dragSY;
    if (Math.abs(nx - ox) > 3 || Math.abs(ny - oy) > 3) didDrag = true;
    ox = nx;
    oy = ny;
    applyTransform();
  });

  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    updateCursor();
    setTimeout(function() { didDrag = false; }, 50);
  });
})();
</script>
